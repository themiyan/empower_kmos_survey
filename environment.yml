# Conda environment for the EMPOWER KMOS spec-z analysis.
# Create with:  conda env create -f environment.yml
# Then:         conda activate empower-kmos
name: empower-kmos
channels:
  - conda-forge
dependencies:
  - python>=3.10
  - astropy>=5.1
  - numpy>=1.23
  - scipy>=1.9
  - matplotlib>=3.5
  - pandas>=1.4
  - astroquery>=0.4.6
  - jupyter
  - ipykernel
